<!DOCTYPE html>
<html lang="no"><head><meta charset="utf-8"><title>jmv røyktest</title>
<style>body{font:14px/1.5 -apple-system,sans-serif;margin:20px;max-width:900px}
pre{background:#f6f7f9;border:1px solid #ddd;padding:8px;overflow-x:auto;font-size:12px}
img{border:1px solid #ddd;max-width:100%}.ok{color:#15803d}.feil{color:#b91c1c}</style>
</head><body>
<h1>jmv-serialiserer: røyktest</h1>
<div id="status">Starter…</div><div id="out"></div>
<script type="module">
const st = document.getElementById('status'), out = document.getElementById('out');
const put = (h) => out.insertAdjacentHTML('beforeend', h);
window.__SMOKE = { done: false, failures: [] };
try {
  const { WebR } = await import('https://webr.r-wasm.org/v0.6.0/webr.mjs');
  const webR = new WebR(); await webR.init();
  st.textContent = 'Installerer jmv/scatr/jsonlite/vcdExtra…';
  await webR.evalRVoid(`webr::install(c('jmv','scatr','jsonlite','vcdExtra'))`);
  await webR.evalRVoid(`suppressMessages({library(jmv);library(scatr);library(jsonlite)})`);
  const helpers = await fetch('../../js/modes/jmv_helpers.R').then(r => r.text());
  await webR.evalRVoid(helpers);
  // jmv::contTables() trekker inn vcdExtra -> ca -> htmlwidgets -> webshot2 -> chromote ->
  // websocket. 'websocket' finnes ikke som wasm-binær i webR-repoet, men chromote bruker den
  // KUN til å fjernstyre en ekte Chrome for widget-skjermbilder — noe contTables sine
  // beregninger aldri kaller. .jmv_install_stubs() (i jmv_helpers.R) installerer derfor en
  // minimal ren-R stub-pakke som lar navneroms-lastingen lykkes. Idempotent/stille hvis
  // websocket alt finnes (ekte pakke eller stub fra tidligere kjøring).
  await webR.evalRVoid(`.jmv_install_stubs()`);
  const shelter = await new webR.Shelter();
  const CASES = [
    ['ttestIS', `d <- subset(ToothGrowth, dose != 1)
      .r <- jmv::ttestIS(data=d, vars='len', group='supp', welchs=TRUE, desc=TRUE, qq=TRUE)`,
      { minTables: 2, minImages: 1 }],
    ['descriptives', `d <- ToothGrowth; d$dose <- factor(d$dose)
      .r <- jmv::descriptives(data=d, vars='len', splitBy='dose', hist=TRUE, box=TRUE, freq=TRUE)`,
      { minTables: 1, minImages: 2 }],
    ['propTestN', `d <- data.frame(x=factor(rep(c('a','b','c'), c(10,15,20))))
      .r <- jmv::propTestN(data=d, var='x')`,
      { minTables: 2, minImages: 0 }],
    // Dekker websocket-stubben (se over) OG superTitle-kontraktsfeltet (utestet av de andre
    // casene): contTables sin "Contingency Tables"-tabell grupperer kolonnene for hver
    // kategori i kolonnevariabelen (Eye) under en felles superTitle.
    ['contTables', `d <- as.data.frame(HairEyeColor)
      d <- d[rep(seq_len(nrow(d)), d$Freq), c('Hair','Eye')]
      .r <- jmv::contTables(data=d, rows='Hair', cols='Eye', exp=TRUE)`,
      { minTables: 2, minImages: 0, needSuperTitle: true }],
    // Regression-fix (jamovi.js buildJmvCall): jmv::linReg's `blocks` option has no dialog
    // control and defaults to [[]] — with an empty block jmv renders dot-filled (all-NA)
    // tables. buildJmvCall now synthesizes `blocks = list(list(covs..., factors...))`; this
    // case reproduces that exact R-call shape end-to-end and asserts the Coefficients table
    // actually has numbers in it (catches the empty-model regression that minTables alone would miss).
    ['linReg', `set.seed(1)
      d <- data.frame(y = rnorm(30), x1 = rnorm(30), x2 = rnorm(30))
      .r <- jmv::linReg(data = d, dep = 'y', covs = c('x1','x2'), blocks = list(list('x1','x2')))`,
      { minTables: 2, minImages: 0, needFiniteCell: true }],
  ];
  for (const [name, setup, want] of CASES) {
    st.textContent = 'Kjører ' + name + '…';
    const cap = await shelter.captureR(
      `local({\n${setup}\nprint(.r)\ncat('\\n##JMV##')\ncat(jsonlite::toJSON(.jmv_serialize(.r), auto_unbox=TRUE, na='null'))\n})`,
      { captureGraphics: { width: 520, height: 380 } });
    const text = cap.output.filter(m => m.type === 'stdout').map(m => m.data).join('\n');
    const payload = JSON.parse(text.slice(text.lastIndexOf('##JMV##') + 7));
    const count = (n, t) => (n.type === t ? 1 : 0) + (n.items || []).reduce((s, k) => s + count(k, t), 0);
    const hasSuperTitle = (n) => (n.type === 'table' && (n.columns || []).some(c => c.superTitle && c.superTitle.length))
      || (n.items || []).some(hasSuperTitle);
    // Fix 1 regression guard: SOME table row has a finite numeric cell. An empty-model table
    // (e.g. blocks[[1]] == list()) renders all-NA/dot-filled rows and would pass minTables
    // alone, so this is what actually catches that regression.
    const hasFiniteCell = (n) => (n.type === 'table' && (n.rows || []).some(r => r.some(v => typeof v === 'number' && isFinite(v))))
      || (n.items || []).some(hasFiniteCell);
    const nT = count(payload, 'table'), nI = count(payload, 'image');
    const stOk = !want.needSuperTitle || hasSuperTitle(payload);
    const fcOk = !want.needFiniteCell || hasFiniteCell(payload);
    const ok = nT >= want.minTables && nI >= want.minImages && nI === (cap.images || []).length && stOk && fcOk;
    if (!ok) window.__SMOKE.failures.push(name);
    put(`<h2 class="${ok ? 'ok' : 'feil'}">${name}: ${ok ? 'OK' : 'FEIL'} — ${nT} tabeller, ${nI} image-noder, ${(cap.images||[]).length} bilder fanget${want.needSuperTitle ? ', superTitle: ' + (stOk ? 'OK' : 'MANGLER') : ''}${want.needFiniteCell ? ', finite cell: ' + (fcOk ? 'OK' : 'MANGLER') : ''}</h2><pre>${JSON.stringify(payload, null, 1).slice(0, 4000)}</pre>`);
    for (const bmp of cap.images || []) {
      const c = document.createElement('canvas'); c.width = bmp.width; c.height = bmp.height;
      c.getContext('2d').drawImage(bmp, 0, 0);
      put(`<img src="${c.toDataURL('image/png')}">`);
    }
    if (cap.cleanup) await cap.cleanup();
  }
  st.textContent = window.__SMOKE.failures.length ? 'RØYKTEST FEIL: ' + window.__SMOKE.failures.join(', ') : 'RØYKTEST OK';
} catch (e) { st.textContent = 'RØYKTEST FEIL: ' + (e.message || e); window.__SMOKE.failures.push(String(e.message || e)); }
window.__SMOKE.done = true;
</script></body></html>
