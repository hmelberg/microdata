# The Python translator runner lives only at /py2m/. The old duplicate under
# /r2m/ was deleted (it shipped a stale copy of the whole py2m package); keep the
# URL working for any external bookmark.
[[redirects]]
  from = "/r2m/py2m_runner.html"
  to = "/py2m/py2m_runner.html"
  status = 301

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.py"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/variable_metadata.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/widgets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/command_help.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Content-Security-Policy-Report-Only (docs/REVIEW_2026-07-07.md §3, CSP item):
# OBSERVE-ONLY — this is the "-Report-Only" header, not "Content-Security-Policy",
# so nothing here can break production; browsers evaluate it and log console
# violations but never block a request because of it. Allowlist derived from
# what the app actually loads: sw.js CDN_HOSTS + PRECACHE_URLS (jsdelivr,
# cdn.plot.ly), index.html's external <script>/<link> tags and dynamic
# import()s (jsdelivr for pyodide/markdown-it/duckdb-wasm, webr.r-wasm.org for
# WebR), and the same-origin /api/* edge functions (this build is BYOK-only —
# no Anvil backend — so AI calls go through same-origin edge functions, which
# in turn call the user's own provider key; no external AI API host needs an
# explicit connect-src entry). The fact that Open-from-URL / connect / load
# directives let a script fetch any user-supplied https: data source is why
# connect-src https: is broad rather than a fixed host list.
# Pyodide needs 'unsafe-eval'+'wasm-unsafe-eval' in script-src; the DuckDB-WASM
# worker is spun up from a blob: URL (worker-src/script-src blob:); the app has
# no build step and ships hand-written inline <script>/style attributes
# throughout index.html, so 'unsafe-inline' is included to match current
# reality rather than flood the console with expected-noise violations.
#
# To promote to enforcing later: watch the browser console (and/or wire up a
# report-to endpoint) for a while, tighten anything unexpectedly broad, then
# either add nonces/hashes to drop 'unsafe-inline' or accept it as a known
# tradeoff, and rename this header to "Content-Security-Policy".
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net https://cdn.plot.ly https://webr.r-wasm.org; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: data: blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"

[[edge_functions]]
  function = "dm-vurder"
  path = "/api/dm-vurder"

[[edge_functions]]
  function = "kode-svar"
  path = "/api/kode-svar"

[[edge_functions]]
  function = "kode-svar-v2"
  path = "/api/kode-svar-v2"

[[edge_functions]]
  function = "tolk-resultat"
  path = "/api/tolk-resultat"

[[edge_functions]]
  function = "hent"
  path = "/api/hent"

[[edge_functions]]
  function = "data-svar"
  path = "/api/data-svar"
