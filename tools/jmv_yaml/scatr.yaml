  - title: Pareto Plot
    name: pareto
    ns: scatr
    menuGroup: More
    menuTitle: Pareto Plot
    category: plots
    options:
      - name: data
        type: Data
        description:
          R: the data as a data frame
      - name: x
        title: X-Axis
        type: Variable
        suggested:
          - nominal
        permitted:
          - factor
        description:
          R: >
            a string naming the variable from `data` that contains the values
            used for the chart
      - name: counts
        title: Counts (optional)
        type: Variable
        default: null
        suggested:
          - continuous
        permitted:
          - numeric
        description:
          R: >
            a string naming the variable from `data` that contains the counts
            for the values (optional)
      - name: barWidth
        title: Width
        type: Number
        default: 0.6
        min: 0
      - name: title
        title: Title text
        type: String
        default: ''
      - name: titleAlign
        title: Align
        type: List
        options:
          - name: left
            title: Left
          - name: center
            title: Center
          - name: right
            title: Right
        default: center
      - name: titleFontSize
        title: Font size
        type: Number
        default: 16
      - name: titleFontFace
        title: Font face
        type: List
        options:
          - name: plain
            title: Plain
          - name: bold
            title: Bold
          - name: italic
            title: Italic
          - name: bold-italic
            title: Bold Italic
        default: plain
      - name: subtitle
        title: Title text
        type: String
        default: ''
      - name: subtitleAlign
        title: Align
        type: List
        options:
          - name: left
            title: Left
          - name: center
            title: Center
          - name: right
            title: Right
        default: left
      - name: subtitleFontSize
        title: Font size
        type: Number
        default: 16
      - name: subtitleFontFace
        title: Font face
        type: List
        options:
          - name: plain
            title: Plain
          - name: bold
            title: Bold
          - name: italic
