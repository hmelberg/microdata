  - title: Line Plot
    name: jmvline
    ns: scatr
    menuGroup: .
    menuTitle: Line Plot
    category: plots
    options:
      - name: mode
        title: Data display
        type: List
        options:
          - name: individual
            title: Individual points
          - name: aggregate
            title: Aggregated data
        default: individual
      - name: data
        type: Data
      - name: x
        title: X-Axis
        type: Variable
      - name: 'y'
        title: Y-Axis
        type: Variable
        suggested:
          - continuous
        permitted:
          - numeric
      - name: group
        title: Grouping Variable
        type: Variable
        suggested:
          - nominal
        permitted:
          - factor
        default: null
      - name: flipAxes
        title: Flip axes
        type: Bool
        default: false
      - name: naOmit
        title: Exclude cases listwise
        type: Bool
        default: false
      - name: line
        title: Show lines
        type: Bool
        default: true
      - name: lineSize
        title: Line size
        type: Number
        default: 0.5
      - name: point
        title: Show points
        type: Bool
        default: true
      - name: pointSize
        title: Point size
        type: Number
        default: 2
      - name: aggregateType
        title: Aggregate
        type: List
        options:
          - name: mean
            title: Mean
          - name: median
            title: Median
        default: mean
      - name: errorBars
        title: Error bars
        type: List
        options:
          - name: none
            title: None
          - name: sd
            title: Standard deviation
          - name: se
            title: Standard error
          - name: ci
            title: Confidence interval
        default: none
      - name: ciWidth
        title: Width
        type: Number
        default: 95
        min: 0
        max: 100
      - name: errorBarWidth
        title: Error bar width
        type: Number
        default: 0.1
        min: 0
      - name: errorBarSize
        title: Error bar line size
        type: Number
        default: 0.5
        min: 0
      - name: title
        title: Title text
        type: String
        default: ''
      - name: titleAlign
        title: Align
        type: List
        options:
          - name: left
            title: Left
          - name: center
            title: Center
          - name: right
            title: Right
        default: center
      - name: titleFontSize
        title: Font size
        type: Number
        default: 16
      - name: titleFontFace
        title: Font face
        type: List
        options:
          - name: plain
            title: Plain
          - name: bold
            title: Bold
          - name: italic
            title: Italic
          - name: bold-italic
            title: Bold Italic
        default: plain
      - name: subtitle
        title: Title text
        type: String
        default: ''
      - name: subtitleAlign
        title: Align
        type: List
        options:
          - name: left
            title: Left
          - name: center
            title: Center
          - name: right
            title: Right
        default: left
      - name: subtitleFontSize
        title: Font size
        type: Number
        default: 16
      - name: subtitleFontFace
        title: Font face
        type: List
        options:
          - name: plain
            title: Plain
          - name: bold
            title: Bold
          - name: italic
            title: Italic
          - name: bold-italic
            title: Bold Italic
        default: plain
      - name: caption
        title: Title text
        type: String
        default: ''
      - name: captionAlign
        title: Align
        type: List
        options:
          - name: left
            title: Left
          - name: center
            title: Center
          - name: right
            title: Right
        default: right
      - name: captionFontSize
        title: Font size
        type: Number
        default: 12
      - name: captionFontFace
        title: Font face
        type: List
        options:
          - name: plain
            title: Plain
          - name: bold
            title: Bold
